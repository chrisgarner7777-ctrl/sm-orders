<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM Mafia Auto Orders</title>
  <style>
    :root { --primary: #00ff88; }
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #ddd; margin: 0; padding: 15px; }
    h1 { color: var(--primary); text-align: center; }
    .section { background: #111; padding: 16px; border-radius: 12px; margin: 15px 0; }
    input, select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { background: var(--primary); color: black; font-weight: bold; border: none; cursor: pointer; }
    button:active { background: #00cc66; }
    .item { padding: 10px; background: #222; margin: 6px 0; border-radius: 6px; }
    .status { padding: 12px; background: #1a1a1a; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🚀 SM Mafia Set & Forget</h1>

  <div class="section">
    <button onclick="openMassOrder()">📌 Open Mass Order Page</button>
    <button onclick="generateAndCopy()">📋 Generate & Copy Mass Orders</button>
  </div>

  <div class="section">
    <h2>Order Profiles</h2>
    <input type="text" id="pName" placeholder="Profile Name">
    <input type="text" id="pService" placeholder="Service ID">
    <input type="text" id="pLink" placeholder="Spotify Link">
    <div style="display:flex; gap:8px;">
      <input type="number" id="pMin" value="50" placeholder="Min Qty" style="width:50%">
      <input type="number" id="pMax" value="500" placeholder="Max Qty" style="width:50%">
    </div>
    <button onclick="addProfile()">+ Add Profile</button>
    <div id="profiles"></div>
  </div>

  <div class="section">
    <h2>Global Settings</h2>
    <input type="number" id="ordersPerDay" value="8" min="1" max="30">
    <input type="number" id="minH" value="2" step="0.5">
    <input type="number" id="maxH" value="5" step="0.5">
    <button onclick="alert('Scheduler started - Use Tasker for real background automation')">▶️ Start Scheduler (Dashboard Reminders)</button>
  </div>

  <div id="status" class="status">Ready • Keep logged in to streamingmafia.com</div>

  <script>
    let profiles = JSON.parse(localStorage.getItem('profiles')) || [];

    function save() {
      localStorage.setItem('profiles', JSON.stringify(profiles));
      render();
    }

    function render() {
      let html = '';
      profiles.forEach((p,i) => {
        html += `<div class="item">${p.name} | ${p.service} | ${p.min}-${p.max} <button onclick="deleteP(${i})">Del</button></div>`;
      });
      document.getElementById('profiles').innerHTML = html || 'No profiles yet';
    }

    function addProfile() {
      const name = document.getElementById('pName').value.trim();
      const service = document.getElementById('pService').value.trim();
      const link = document.getElementById('pLink').value.trim();
      const min = parseInt(document.getElementById('pMin').value);
      const max = parseInt(document.getElementById('pMax').value);

      if (name && service && link) {
        profiles.push({name, service, link, min, max});
        save();
      }
    }

    function deleteP(i) {
      profiles.splice(i,1);
      save();
    }

    function openMassOrder() {
      window.open('https://streamingmafia.com/massorder', '_blank');
    }

    function generateAndCopy() {
      if (profiles.length === 0) {
        alert("Add some profiles first");
        return;
      }
      let text = "";
      const num = Math.min(8, Math.max(3, Math.floor(Math.random()*6)+3)); // 3-8 orders
      for (let i = 0; i < num; i++) {
        const p = profiles[Math.floor(Math.random() * profiles.length)];
        const qty = Math.floor(Math.random() * (p.max - p.min + 1)) + p.min;
        text += `${p.service}|${p.link}|${qty}\n`;
      }
      navigator.clipboard.writeText(text);
      document.getElementById('status').innerHTML = `✅ ${num} orders copied to clipboard!<br>Paste into Mass Order box → Submit`;
    }

    render();
  </script>
</body>
</html>
